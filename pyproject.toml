[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-hpc"
version = "0.2.0"
description = "HPC orchestrator for Claude Code and agent harnesses (MARs, etc.)"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
    "jsonschema>=4.0",
]
tui = [
    "rich>=13.0",
]

[project.scripts]
hpc-mapreduce = "hpc_mapreduce.cli:main"

[tool.setuptools.packages.find]
include = ["hpc_mapreduce*", "slash_commands*"]

[tool.setuptools.package-data]
hpc_mapreduce = [
    "config/*.yaml",
    "templates/sge/*",
    "templates/slurm/*",
    "templates/starters/*.py",
    "schemas/*.json",
    "py.typed",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
