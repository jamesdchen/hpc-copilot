[build-system]
requires = ["setuptools>=68.0", "setuptools-scm>=8.0"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-hpc"
version = "0.2.0"
description = "HPC orchestrator for Claude Code and agent harnesses (MARs, etc.)"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    # Schema validation is part of the documented CLI contract
    # (docs/cli-spec.md): every ``--spec`` payload is validated against
    # the matching JSON Schema before the subcommand runs.  Importing
    # the library lazily keeps the lock-step with older installs that
    # haven't picked it up yet, but it must be a runtime dep.
    "jsonschema>=4.0",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
    "types-PyYAML>=6.0",
]
tui = [
    "rich>=13.0",
]

[project.scripts]
hpc-mapreduce = "claude_hpc.agent_cli:main"

[tool.setuptools.packages.find]
include = ["claude_hpc*", "slash_commands*"]

[tool.setuptools.package-data]
claude_hpc = [
    "config/*.yaml",
    "schemas/*.json",
    "mapreduce/templates/*.py",   # tasks_example.py, cli_dispatcher.py
    "mapreduce/templates/common/*.sh",
    "mapreduce/templates/sge/*",
    "mapreduce/templates/slurm/*",
    "mapreduce/templates/starters/*.py",
    "py.typed",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "W", "UP", "B", "SIM", "TCH"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
