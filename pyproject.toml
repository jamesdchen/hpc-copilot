[build-system]
requires = ["setuptools>=68.0"]
build-backend = "setuptools.build_meta"

[project]
name = "claude-hpc"
version = "0.3.0"
description = "HPC orchestrator for Claude Code and external agent harnesses"
requires-python = ">=3.10"
dependencies = [
    "pyyaml>=6.0",
    # Schema validation is part of the documented CLI contract
    # (docs/cli-spec.md): every ``--spec`` payload is validated against
    # the matching JSON Schema before the subcommand runs.  Importing
    # the library lazily keeps the lock-step with older installs that
    # haven't picked it up yet, but it must be a runtime dep.
    # 4.18 vendored ``referencing`` and switched the validator API to
    # accept a Registry; we depend on that for cross-file ``$ref``
    # resolution (consumer schemas reference envelope.json#/$defs/*).
    "jsonschema>=4.18",
    "referencing>=0.30",
    # Pydantic v2 for Spec / Result models. The hand-authored JSON
    # schemas under ``claude_hpc/schemas/`` are still the wire SoT;
    # Pydantic models are the *authoring* surface and their
    # ``model_json_schema()`` output is regenerated into the JSON
    # files by ``scripts/build_schemas.py``. Switched on for the
    # submit-flow canary; rolling out per-atom incrementally.
    "pydantic>=2.6",
]

[project.optional-dependencies]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
    "pytest-xdist>=3.8",
    "pytest-cov>=5.0",
    "hypothesis>=6.100",
    "types-PyYAML>=6.0",
    "pre-commit>=3.5",
]
tui = [
    "rich>=13.0",
]
forecasting = [
    # Used by ``scripts/train_wait_predictor.py`` to fit the queue-wait
    # residual regression. Inference (``forecast/predict_start.py``)
    # also imports it lazily; without lightgbm installed the predictor
    # falls back to the deterministic floor only.
    "lightgbm>=4.0",
]

[project.scripts]
hpc-agent = "claude_hpc.agent_cli:main"

[tool.setuptools.packages.find]
where = ["src"]
include = ["claude_hpc*", "slash_commands*"]

[tool.setuptools.package-data]
claude_hpc = [
    "config/*.yaml",
    "schemas/*.json",
    "operations.json",
    "mapreduce/templates/scaffolds/*.py",
    "mapreduce/templates/runtime/common/*.sh",
    "mapreduce/templates/runtime/sge/*",
    "mapreduce/templates/runtime/slurm/*",
    "py.typed",
]
slash_commands = [
    "commands/*.md",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers -n auto -m 'not slow'"
markers = [
    "slow: real-process / real-time tests (subprocess + signals, multi-hour forecast sweeps). Skipped by default. Opt in with `pytest -m slow`; run everything with `pytest -m ''`.",
]

[tool.ruff]
target-version = "py310"
line-length = 100

[tool.ruff.lint]
# TCH (move-imports-into-TYPE_CHECKING) is dropped: this codebase
# routes Pydantic specs through atom signatures (``def atom(spec:
# FooSpec)``), and our ``_schema_models/*.py`` re-export shared types
# whose runtime presence is required even though the static analyzer
# can't see it. The rule generates false positives on every wire-input
# atom + every shared-type re-export, drowning out the rare real hit.
select = ["E", "F", "I", "W", "UP", "B", "SIM"]

# ``_schema_models/`` Field(description=...) and module docstrings
# routinely exceed the 100-char line limit because the descriptions
# ARE the wire-schema text — keeping them on one line preserves the
# diff readability that matters when the schema actually changes.
[tool.ruff.lint.per-file-ignores]
"src/claude_hpc/_schema_models/*.py" = ["E501"]

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
ignore_missing_imports = true
mypy_path = ["src"]

# Coverage is a discovery tool, not a gate. Run with:
#   pytest -m '' --cov=src/claude_hpc --cov-report=term-missing
# to surface untested files in the critical path. No fail-under
# threshold — chasing % over behaviour-coverage is the anti-pattern.
[tool.coverage.run]
source = ["src/claude_hpc"]
branch = true
omit = [
    "src/claude_hpc/schemas/*",  # generated JSON, not Python
    "src/claude_hpc/_schema_models/*",  # schema models — covered via roundtrip
    "src/claude_hpc/mapreduce/templates/*",  # user-facing template files
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "raise NotImplementedError",
    "\\.\\.\\.",
]
show_missing = true
skip_empty = true

[dependency-groups]
dev = [
    "pytest-xdist>=3.8.0",
]
