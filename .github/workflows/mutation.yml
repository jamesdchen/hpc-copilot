# Scheduled mutation-testing sweep of the cluster verbs (INFORMATIONAL,
# NON-REQUIRED, NEVER per-PR).
#
# Why scheduled and not per-PR (devx B4 ruling,
# docs/plans/devx-and-pack-seams-2026-07-15.md): a mutmut sweep re-runs the
# whole test suite once per mutant, so even a scope tightened to the cluster
# verbs is tens of minutes to hours. That is far too slow for the PR gate. The
# value is the periodic SIGNAL -- surviving mutants in submit_flow /
# aggregate_flow / transport, where a silent wrong-path costs real cluster
# time -- so it runs weekly and on demand, uploads its results as an artifact,
# and never blocks a merge.
#
# Scoping: scripts/mutmut_shortlist.py rewrites [tool.mutmut].paths_to_mutate
# in the *ephemeral* runner checkout to just the cluster-verb set (never
# committed). The same script's `report` output records which functions in
# those modules mutmut can actually reach vs. which are BLIND behind a lazy
# import (the extraction shortlist) -- see docs/internals/mutation-testing.md.
name: mutation

on:
  # Weekly, Monday 06:00 UTC. Off the PR path entirely.
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      changed_since:
        description: >-
          Optional git ref: scope the sweep to cluster-verb files changed
          since this ref (empty = full cluster-verb set).
        required: false
        default: ""

# One sweep at a time; a newer dispatch supersedes an in-flight one.
concurrency:
  group: mutation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  sweep:
    runs-on: ubuntu-latest
    # GitHub-hosted runners cap at 6h; a scoped sweep fits well inside this,
    # and the job never gates a merge, so a generous ceiling is fine.
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # changed-since diffs need history; a shallow clone would break it.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev + mutation extras)
        # mutmut is PINNED via the ``mutation`` extra (mutmut==3.6.0). An unpinned
        # bump silently re-shaped a whole run once (triage-2); the pin lives in
        # pyproject so local and CI resolve the identical mutmut.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,mutation]'

      - name: Report the mutmut reachability shortlist (informational)
        run: |
          python scripts/mutmut_shortlist.py report | tee shortlist-report.txt
          python scripts/mutmut_shortlist.py report --json > shortlist-report.json

      - name: Scope [tool.mutmut] paths_to_mutate AND tests_dir to the cluster verbs
        # --apply-tests-dir narrows tests_dir from the committed whole-8k-suite
        # default to the focused cluster-verb covering set. WITHOUT it, mutmut
        # cannot fit a baseline + a single mutant inside this step, so every one
        # of the ~6076 mutants stayed "not checked" and the job read green on
        # ZERO signal (run 29560911639 / memo Unit A). Ephemeral checkout only.
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.changed_since }}" ]; then
            ARGS="--changed-since ${{ github.event.inputs.changed_since }}"
          fi
          python scripts/mutmut_shortlist.py paths $ARGS \
            --apply-to-pyproject pyproject.toml --apply-tests-dir
          echo "----- scoped [tool.mutmut] block -----"
          sed -n '/\[tool.mutmut\]/,/^\[/p' pyproject.toml

      - name: Run the mutation sweep
        # Survivors are the SIGNAL, not a failure: mutmut exits non-zero when
        # any mutant survives, so tolerate a non-zero exit and let the results
        # step + artifact carry the outcome. A genuine infra break still shows
        # in the logs.
        run: |
          rm -rf mutants/
          mutmut run || echo "mutmut exited non-zero (survivors or skips) -- see results"

      - name: Collect results
        if: always()
        run: |
          echo "===== mutmut results =====" | tee mutation-results.txt
          mutmut results 2>&1 | tee -a mutation-results.txt || true

      - name: Zero-signal tripwire (a green sweep MUST mean signal)
        # FAILS the job if not a single mutant was checked -- the exact
        # zero-signal-but-green failure the triage found (all 6076 "not
        # checked"). Runs even after a non-zero `mutmut run` (survivors are
        # tolerated upstream) so a real zero-signal run turns the job RED
        # instead of silently green. This is why no weekly pause is needed:
        # once zero-signal is red, a green run is trustworthy (memo Unit A).
        run: python scripts/mutmut_shortlist.py tripwire --mutants-dir mutants

      - name: Upload sweep artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-sweep
          path: |
            shortlist-report.txt
            shortlist-report.json
            mutation-results.txt
            mutants/**/*.meta
          if-no-files-found: warn
          retention-days: 30

  # ── curated per-module matrix (workflow_dispatch ONLY) ──────────────────────
  #
  # The SECOND B4 mechanism (devx batch): a curated map of high-value pure-logic
  # modules (scripts/run_mutation.py MODULE_MAP), each swept against its OWN
  # focused test file so one module's sweep fits inside a single CI step. This is
  # DISPATCH-ONLY (never scheduled, never per-PR) -- an on-demand probe you run
  # after hardening a module or before trusting a test battery. continue-on-error
  # so a surviving-mutant exit never reads as a red check; results upload per
  # module. mutmut is Linux-only, which is why this lives in CI and the runner
  # refuses to launch it on Windows.
  curated-keys:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      keys: ${{ steps.emit.outputs.keys }}
    steps:
      - uses: actions/checkout@v7
      - id: emit
        # Single source of truth: the matrix is the runner's own module map, so
        # the two can never drift.
        run: echo "keys=$(python scripts/run_mutation.py --keys)" >> "$GITHUB_OUTPUT"

  curated-modules:
    needs: curated-keys
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        module: ${{ fromJSON(needs.curated-keys.outputs.keys) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package (dev + mutation extras)
        # mutmut PINNED via the ``mutation`` extra (mutmut==3.6.0) -- see the sweep
        # job's install note.
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev,mutation]'

      - name: Run the curated mutation sweep for ${{ matrix.module }}
        # The runner scopes [tool.mutmut] to this module + its tests, runs
        # mutmut, restores pyproject, and prints the survivor results. It
        # tolerates mutmut's survivor exit internally, so the step is green
        # unless the infra itself breaks. continue-on-error is STEP-scoped (was
        # job-scoped): a surviving-mutant / infra hiccup here must not read red,
        # but the tripwire step below is authoritative and DOES fail the job on a
        # zero-signal (dark) module.
        continue-on-error: true
        run: python scripts/run_mutation.py --module ${{ matrix.module }} | tee mutation-${{ matrix.module }}.txt

      - name: Curated zero-signal tripwire for ${{ matrix.module }}
        # FAILS the job unless a mutant in this module was killed or survived. The
        # curated matrix used to conclude GREEN even when every module aborted with
        # ZERO verdicts (a chdir test crashed stats collection, or the coverage-join
        # found nothing) -- the exact zero-signal-but-green failure the sweep tripwire
        # guards against, but the curated jobs had no equivalent (triage-2 Finding #2).
        # NOT continue-on-error, so a dark curated module turns this job RED.
        run: python scripts/run_mutation.py --tripwire --mutants-dir mutants

      - name: Upload per-module results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mutation-curated-${{ matrix.module }}
          path: |
            mutation-${{ matrix.module }}.txt
            mutants/**/*.meta
          if-no-files-found: warn
          retention-days: 30
