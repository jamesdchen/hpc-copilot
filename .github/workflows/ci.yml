name: ci

# Flake auto-recovery (2026-06-04): same pattern as ``docs.yml``. On
# ``pull_request`` events a separate ``regen-pr`` job regenerates the
# NON-DOCS generated artifacts (schemas, baked operations.json) and
# commits the result back to the PR branch via
# ``stefanzweifel/git-auto-commit-action``. All docs/ regen+commit is
# owned by ``docs.yml`` instead, so the two workflows' auto-commit
# ``file_pattern``s are disjoint (``src/hpc_agent/...`` here vs
# ``docs/...`` there) and can never race to push the same path. The
# auto-commit triggers a fresh workflow run; workflow-level
# ``concurrency`` cancels the in-flight run so only the post-regen run
# reports status. The ``test`` matrix runs independently and regenerates
# ALL artifacts locally (its own non-committing ``--write`` step) before
# the ``--check`` gates below, so every gate self-heals regardless of
# which workflow lands the committed drift.

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref }}
  cancel-in-progress: true

jobs:
  # PR-only: regenerate every checked-in generated artifact and commit
  # the diff back to the PR branch. Eliminates the "merge main + regen
  # + force-push" manual workaround when another PR lands primitives /
  # schemas / frontmatter while this one was open. On ``push`` events
  # to ``main`` / ``claude/**`` this job is skipped — the matrix
  # ``--check`` gates below act as the hard self-consistency gate.
  regen-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          # Same PR-head reasoning as docs.yml — the auto-commit
          # push target must be the PR branch itself, not the ephemeral
          # merge ref, and it must be the head *branch* (a SHA checkout
          # is detached HEAD, where git-auto-commit's push fails).
          ref: ${{ github.event.pull_request.head.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install package with dev extras
        run: pip install -e '.[dev]' pyyaml
      - name: Regenerate the non-docs generated artifacts
        # This job OWNS regen+commit of the non-docs generated files only:
        # src/hpc_agent/schemas/ and src/hpc_agent/operations.json. All
        # docs/ regen+commit is owned by docs.yml — the two auto-commit
        # file_patterns are disjoint (src/hpc_agent/... here vs docs/...
        # there), so the two workflows can no longer race to push the same
        # path. Each is idempotent: a no-op when already consistent.
        run: |
          python scripts/build_schemas.py --write
          python scripts/bake_operations_json.py --write
      - name: Commit regen drift to PR branch
        # No-op when no diff; only fires when the regen actually
        # changed something. NOTE: pushes made with the workflow's
        # GITHUB_TOKEN do not trigger a fresh workflow run (GitHub
        # drops actor-token events to prevent loops), so this run's
        # other jobs still see the pre-regen SHA — the auto-commit
        # lands the fix, and the next contributor push (or a manual
        # re-run) turns the checks green.
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: "chore(generated): auto-regenerate after upstream drift"
          file_pattern: "src/hpc_agent/operations.json src/hpc_agent/schemas/"
          commit_user_name: github-actions[bot]
          commit_user_email: github-actions[bot]@users.noreply.github.com

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v7
        with:
          # When the auto-regen above pushes a new commit, the
          # workflow-level concurrency cancels this run and the
          # post-regen run picks up the regenerated files via its own
          # checkout — so this job always sees a consistent state.
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # Include uv.lock so a transitive-dep bump invalidates the
          # cache; pyproject.toml alone misses lockfile-only changes.
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install package with dev extras
        run: pip install -e '.[dev]'
      # Static analysis + generator-drift gates are Python-version-independent
      # (ruff, mypy, the lints, and the ``--check`` gates behave identically on
      # 3.10 / 3.11 / 3.12), so they run on ONE matrix leg (3.12) instead of all
      # three — the other two legs exist to run the test suite across versions.
      - name: Auto-regenerate generated artifacts (PR only)
        # docs.yml's proven pattern, adopted here: on a PR, regenerate every
        # checked-in generated artifact LOCALLY before the ``--check`` gates
        # below. The separate ``regen-pr`` job lands the fix back on the branch,
        # but its GITHUB_TOKEN auto-commit does not trigger a fresh run and this
        # leg checked out the pre-regen SHA — so without this local regen the
        # ``--check`` gates would see stale files and fail on a branch whose
        # generated files merely drifted against an upstream merge. Skipped on
        # push to main / claude/**, where ``--check`` is the hard gate.
        #
        # ``regen_all.py`` runs all SIX generators in dependency order plus the
        # pending-docs check — one recipe. It also regenerates
        # ``cli/_verb_module_map.py``, which the old per-script list here OMITTED
        # (so a PR that added an ungrouped verb healed everything BUT the map).
        if: matrix.python-version == '3.12' && github.event_name == 'pull_request'
        run: python scripts/regen_all.py --write
      - name: Ruff lint
        if: matrix.python-version == '3.12'
        run: ruff check .
      - name: Ruff format check
        if: matrix.python-version == '3.12'
        run: ruff format --check .
      - name: Mypy
        if: matrix.python-version == '3.12'
        run: mypy src/hpc_agent
      - name: Check primitive frontmatter is regenerated from registry
        if: matrix.python-version == '3.12'
        run: python scripts/build_primitive_frontmatter.py --check
      - name: Check no pending primitive docs
        if: matrix.python-version == '3.12'
        run: python scripts/check_no_pending_primitive_docs.py
      - name: Check skills <-> slash_commands stay in sync
        if: matrix.python-version == '3.12'
        run: python scripts/lint_skill_command_sync.py
      - name: Lint decision-content blocks stay byte-identical across files
        if: matrix.python-version == '3.12'
        run: python scripts/lint_decision_content.py
      - name: Lint @pure files (no I/O imports/calls)
        if: matrix.python-version == '3.12'
        run: python scripts/lint_pure_files.py
      - name: Lint subject imports (no cross-subject reach)
        if: matrix.python-version == '3.12'
        run: python scripts/lint_subject_imports.py
      - name: Lint library-knowledge imports (declared assembly points only)
        if: matrix.python-version == '3.12'
        run: python scripts/lint_library_knowledge.py
      - name: Lint subject __init__.py is docstring-only
        if: matrix.python-version == '3.12'
        run: python scripts/lint_subject_init.py
      - name: Lint text I/O declares utf-8 encoding
        if: matrix.python-version == '3.12'
        run: python scripts/lint_text_io_encoding.py
      - name: Lint durable artifacts are written atomically
        if: matrix.python-version == '3.12'
        run: python scripts/lint_atomic_durable_writes.py
      - name: Lint cluster-side schema-version constants stay synced
        if: matrix.python-version == '3.12'
        run: python scripts/lint_schema_versions.py
      - name: Lint cluster-deployed files stay under the Python version floor
        if: matrix.python-version == '3.12'
        run: python scripts/lint_deploy_python_floor.py
      - name: Lint telemetry fields declare cumulative vs per-tick delta
        if: matrix.python-version == '3.12'
        run: python scripts/lint_telemetry_labels.py
      - name: Lint every schema file is reachable from schema_for
        if: matrix.python-version == '3.12'
        run: python scripts/lint_schema_reachability.py
      - name: Lint public wire models resolve to an emitted schema
        if: matrix.python-version == '3.12'
        run: python scripts/lint_wire_suffix.py
      - name: Lint mirror comments name their twin + pinning test
        if: matrix.python-version == '3.12'
        run: python scripts/lint_mirror_ledger.py
      - name: Lint plugin->core API surface (stay-inside + anti-drift)
        # Both legs run without the plugin installed: the stay-inside AST scan
        # reads the plugin source in the checkout, and the anti-drift leg
        # imports each allowlisted symbol from the installed hpc_agent.
        if: matrix.python-version == '3.12'
        run: python scripts/lint_plugin_api_surface.py
      - name: Lint no cross-package private-symbol imports
        if: matrix.python-version == '3.12'
        run: python scripts/lint_private_cross_package_imports.py
      - name: Lint heavy libraries are imported lazily (cold-startup, plan B1)
        if: matrix.python-version == '3.12'
        run: python scripts/lint_lazy_heavy_imports.py
      - name: Lint parser flags match the baked catalog (fast-path truth, unit 1.2)
        if: matrix.python-version == '3.12'
        run: python scripts/lint_parser_bake_truth.py
      - name: Check JSON schemas regenerated from Pydantic
        if: matrix.python-version == '3.12'
        run: python scripts/build_schemas.py --check
      - name: Check baked operations.json is up to date
        if: matrix.python-version == '3.12'
        run: python scripts/bake_operations_json.py --check
      - name: Check all generated artifacts regenerate cleanly (regen-all)
        # The single-recipe superset of the per-script ``--check`` gates above.
        # Its job here is coverage the granular gates DON'T give:
        # ``cli/_verb_module_map.py`` has no other ``--check`` gate in any
        # workflow, so this is its ONLY CI gate. Runs on the 3.12 leg ONLY (the
        # one that ran the local ``--write`` heal above), honouring the self-heal
        # doctrine — a pytest-embedded check would fire on the 3.10/3.11 legs and
        # the Windows lane, which never regenerate locally. On push events the
        # committed tree is authoritative and this is the hard gate.
        if: matrix.python-version == '3.12'
        run: python scripts/regen_all.py --check
      - name: Pytest (default)
        # 3.10 / 3.11 run the plain default tier; the 3.12 leg runs the
        # coverage-instrumented variant below instead (folded here from a
        # former separate pass — the two are mutually exclusive by ``if:``).
        if: matrix.python-version != '3.12'
        run: pytest -q
      - name: Pytest (default, with coverage)
        # The 3.12 leg's default-tier run, now carrying ``--cov`` so a single
        # gating pass both runs the tests AND measures coverage — folding the
        # former standalone "Coverage report" step into the gate it duplicated.
        # The coverage NUMBER stays informational (no ``fail-under`` threshold —
        # see ``[tool.coverage.report]`` in pyproject.toml), but this step gates
        # the ``test (3.12)`` job exactly as the plain ``pytest -q`` it replaces:
        # a real test failure reds the job. No ``-m 'not slow'`` needed — the
        # project ``addopts`` (pyproject.toml:168) already deselects the slow
        # tier, which runs separately below.
        #
        # Install the ``process_startup`` .pth and set COVERAGE_PROCESS_START
        # so the ~37 test files that drive the CLI via a spawned ``python``
        # have their child lines counted too (``parallel``/``sigterm`` live in
        # ``[tool.coverage.run]``; ``run_cli`` forwards the env vars into the
        # children). Without this the ``cli/*`` modules read as near-zero
        # coverage despite being exercised through the wire.
        #
        # COVERAGE_FILE must be absolute: spawned CLIs run in a per-test
        # ``tmp_path`` cwd, so a relative data-file name would scatter their
        # ``.coverage.<host>.<pid>`` shards where pytest-cov's session-end
        # combine can't find them. Pinning it next to the parent's data file
        # lets the combine pick every shard up.
        if: matrix.python-version == '3.12'
        env:
          COVERAGE_PROCESS_START: ${{ github.workspace }}/pyproject.toml
          COVERAGE_FILE: ${{ github.workspace }}/.coverage
        run: |
          python scripts/enable_subprocess_coverage.py
          pytest -q --cov=src/hpc_agent --cov-report=term-missing
      - name: Pytest (slow tier)
        # Gated on the 3.12 leg only (A3): slow tests are real-process/real-time
        # and dominated by wall-clock, not version-specific bytecode paths — the
        # same one-leg reasoning as the lints/mypy hoist above. ``!cancelled()``
        # (not ``always()``) keeps the run-even-after-an-earlier-step-failed
        # signal while letting a cancelled run release the runner immediately:
        # under cancel-in-progress concurrency (see :27-29) ``always()`` would
        # keep this multi-hour tier running on superseded pushes and leak runner
        # minutes.
        if: ${{ !cancelled() && matrix.python-version == '3.12' }}
        # ``--timeout=0`` disables the default-tier per-test cap: slow tests are
        # real-time/multi-hour by design and self-bound via the
        # subprocess-timeout discipline, so a 300s cap would falsely kill them.
        run: pytest -q -m slow --timeout=0

  plugins:
    # Isolated plugin suites. Installing a plugin makes the host's entry-point
    # scan discover its backend, which shifts ``registered_backend_names()`` (and
    # thus ``capabilities.supported_schedulers``) — so plugin tests run in their
    # OWN job, never mixed into the ``test`` matrix, to keep that registry
    # pollution out of the core suite. Offline ONLY: every plugin test drives a
    # FAKE API client, so no token / network is needed. The live
    # ``workflow_dispatch`` round-trip is deliberately out of scope — it would be
    # circular (an Actions backend tested on Actions) and burns real minutes.
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Plugins that ship a ``tests/`` dir. Add a plugin here when it grows one.
        plugin: ["hpc-agent-github-actions", "hpc-agent-notebook-render"]
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install core (with test harness) + plugin
        # ``.[dev]`` FIRST so the plugin's ``hpc-agent`` dependency resolves to
        # the workspace, not PyPI — and so the plugin tests run under the same
        # pytest harness the repo's ``addopts`` assume (``-n auto`` needs
        # pytest-xdist, the ``timeout`` ini needs pytest-timeout). The plugin
        # goes on top with ``--no-deps`` so it does not re-pull core.
        #
        # ``--no-deps`` also means a plugin's OWN third-party deps are not pulled,
        # so a plugin with real deps installs them explicitly. hpc-agent-notebook-
        # render needs the renderer stack (jupytext/nbformat/nbclient + ipykernel,
        # which registers the ``python3`` kernelspec its --execute tests run
        # against) — installed here, not via the plugin's dependencies, so
        # ``--no-deps`` still keeps the workspace hpc-agent authoritative.
        run: |
          pip install -e '.[dev]'
          if [ "${{ matrix.plugin }}" = "hpc-agent-notebook-render" ]; then
            pip install jupytext nbformat nbclient ipykernel nbdime
          fi
          pip install -e "examples/plugins/${{ matrix.plugin }}" --no-deps
      - name: Lint plugin manifest reconciles with runtime
        # Runs HERE, not in the ``test`` job: ``lint_plugin_manifests`` is a hard
        # no-op (``return 0``) when no plugins are installed, and the ``test`` job
        # installs none — so it could never actually fire there. This job installs
        # a plugin, so the lint checks that plugin's MANIFEST against the runtime
        # reality (primitive names, worker-prompt overlays, cli_register).
        run: python scripts/lint_plugin_manifests.py
      - name: Fire the plugin API surface (notebook-render only)
        # The fire-path leg registers the plugin's verbs and proves the whole
        # declared import surface resolves at call time — only meaningful where
        # the plugin + its deps are installed, i.e. this leg.
        if: matrix.plugin == 'hpc-agent-notebook-render'
        run: python scripts/lint_plugin_api_surface.py --fire-path
      - name: Plugin offline tests (fake API client, zero network)
        run: pytest -q "examples/plugins/${{ matrix.plugin }}/tests"
      - name: actionlint workflow templates (syntax + expressions)
        # Validates the workflow/expression surface hpc-agent edits (matrix, job
        # names, dispatch inputs) without running it. shellcheck is disabled: the
        # template's run-steps are user-facing examples, not hpc-agent's shell.
        #
        # Non-blocking: this fetches a binary from GitHub each run, so a release-
        # CDN hiccup must never gate mergeability — the plugin tests above are the
        # hard gate; this is advisory. The download script AND the binary are
        # both pinned to v1.7.12 (no moving ``main`` ref), and ``curl -f --retry``
        # piped into bash makes a failed download fail fast instead of feeding a
        # stray error body to the shell.
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          tpl_dir="examples/plugins/${{ matrix.plugin }}/workflow-template"
          if compgen -G "$tpl_dir/*.yml" > /dev/null; then
            curl -fsSL --retry 3 --retry-delay 2 \
              https://raw.githubusercontent.com/rhysd/actionlint/v1.7.12/scripts/download-actionlint.bash \
              | bash -s -- 1.7.12 .
            ./actionlint -shellcheck= "$tpl_dir"/*.yml
          else
            echo "no workflow-template for ${{ matrix.plugin }} — skipping"
          fi

  conformance:
    # The harness-conformance kit run against our two reference adapters
    # (``docs/design/conformance-kit.md`` D-K5). Self-conformance in CI: every
    # push re-certifies that the Claude Code hook cores and the notebook-render
    # plugin still satisfy the published harness contract — if either fails, the
    # contract has drifted from the code that implements it.
    #
    # Plugins-style ISOLATED for the same reason as the ``plugins`` job: the
    # notebook leg installs the notebook-render plugin, whose entry point shifts
    # ``registered_backend_names()``; that registry pollution must never leak into
    # the core ``test`` matrix. Offline ONLY — the adapters drive the hook cores /
    # render stack in-process; no live harness, no token, no socket (the
    # conformance-lane boundary in the design's Q1 watch list).
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # The reference adapters shipped with the kit. ``claude-code`` is the
        # FULLY-conforming reference; the rest are honestly PARTIAL. Each maps to a
        # ``module.path:factory`` below.
        #  * ``notebook-render`` — capability 1 only (utterance-log).
        # The Wave-C second-harness proofs (non-Claude conforming shapes,
        # ``docs/plans/anti-vendor-lockout-2026-07-17.md`` Wave C):
        #  * ``response-gateway`` — capability 2 / ACT via ``verify_relay`` pre-delivery.
        #  * ``otel-genai`` — capability 2 / INSPECT (the disclosed weaker tier).
        #  * ``foreign-backgrounding`` — capability 3 via a plain subprocess detach/wake.
        adapter:
          - "claude-code"
          - "notebook-render"
          - "response-gateway"
          - "otel-genai"
          - "foreign-backgrounding"
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install core (with test harness) + kit lane deps
        # ``.[dev]`` FIRST so ``hpc_agent.conformance`` resolves to the workspace
        # and the kit runs under the repo's pytest harness. ``in-toto`` +
        # ``securesystemslib`` are dev-deps of THIS lane ONLY (the K7 stock
        # round-trip ``pytest.importorskip``s them) — installed here like the
        # plugins job installs jupytext, NEVER in core dependencies (the design's
        # in-toto boundary rule). The notebook leg additionally needs the render
        # stack (jupytext/nbformat/nbclient + ipykernel for the ``python3``
        # kernelspec, nbdime) and the plugin itself installed ``--no-deps`` so the
        # workspace hpc-agent stays authoritative — mirroring the ``plugins`` job.
        run: |
          pip install -e '.[dev]'
          pip install in-toto securesystemslib
          if [ "${{ matrix.adapter }}" = "notebook-render" ]; then
            pip install jupytext nbformat nbclient ipykernel nbdime
            pip install -e "examples/plugins/hpc-agent-notebook-render" --no-deps
          fi
      - name: Run the conformance kit against the ${{ matrix.adapter }} adapter
        # The kit is addressed by DIRECTORY (not ``--pyargs``, not a file list):
        # the package ``conftest.py`` in that dir registers ``--harness-adapter``
        # during initial-path conftest collection — ``--pyargs`` names a module,
        # not a path, so the option would be unknown at parse time (the quirk the
        # K4/K6/K8 reports document). Directory form also means the K7 attestation
        # module joins the run automatically when its branch merges — no file list
        # to update. ``-o addopts=`` drops the repo's ``-n auto`` so the run stays
        # single-process and the conformance report's verdict tally (a
        # session-scoped stash) is coherent in one terminal summary; the verdict
        # line surfaces in this job log.
        run: |
          case "${{ matrix.adapter }}" in
            claude-code) factory="hpc_agent.conformance.adapters.claude_code:build" ;;
            notebook-render) factory="hpc_agent.conformance.adapters.notebook_render:build" ;;
            response-gateway) factory="hpc_agent.conformance.adapters.response_gateway:build" ;;
            otel-genai) factory="hpc_agent.conformance.adapters.otel_genai:build" ;;
            foreign-backgrounding) factory="hpc_agent.conformance.adapters.foreign_backgrounding:build" ;;
            *) echo "unknown adapter ${{ matrix.adapter }}" >&2; exit 1 ;;
          esac
          pytest -o addopts= -p no:cacheprovider -q \
            src/hpc_agent/conformance/ \
            --harness-adapter "$factory"

  test-windows:
    # Signal-only Windows lane (ref #163): there is otherwise no Windows
    # coverage in CI, so Windows-specific correctness only surfaces during
    # live testing. This runs the same default test command as the Linux
    # ``test`` job on windows-latest. It is intentionally non-blocking
    # (``continue-on-error``) because ~86 tests are skipped on Windows and
    # the suite may be red here until those skips are triaged (#163);
    # making it required would block merges before that work is done.
    name: test (windows)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          # Include uv.lock so a transitive-dep bump invalidates the
          # cache; pyproject.toml alone misses lockfile-only changes.
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install package with dev extras
        # Use bash (available on windows-latest) so the ``'.[dev]'``
        # quoting and command semantics match the Linux job exactly
        # rather than relying on the default pwsh shell.
        shell: bash
        run: pip install -e '.[dev]'
      - name: Pytest (default)
        shell: bash
        run: pytest -q
