name: ci

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          # Include uv.lock so a transitive-dep bump invalidates the
          # cache; pyproject.toml alone misses lockfile-only changes.
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install package with dev extras
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy src/hpc_agent
      - name: Check primitive frontmatter is regenerated from registry
        run: python scripts/build_primitive_frontmatter.py --check
      - name: Check no pending primitive docs
        run: python scripts/check_no_pending_primitive_docs.py
      - name: Check skills <-> slash_commands stay in sync
        run: python scripts/lint_skill_command_sync.py
      - name: Lint @pure files (no I/O imports/calls)
        run: python scripts/lint_pure_files.py
      - name: Lint subject imports (no cross-subject reach)
        run: python scripts/lint_subject_imports.py
      - name: Lint subject __init__.py is docstring-only
        run: python scripts/lint_subject_init.py
      - name: Lint plugin manifests reconcile with runtime
        run: python scripts/lint_plugin_manifests.py
      - name: Check JSON schemas regenerated from Pydantic
        run: python scripts/build_schemas.py --check
      - name: Check baked operations.json is up to date
        run: python scripts/bake_operations_json.py --check
      - name: Pytest (default)
        run: pytest -q
      - name: Pytest (slow tier)
        if: always()
        run: pytest -q -m slow
      - name: Coverage report (informational, not gated)
        if: matrix.python-version == '3.12'
        # Pass ``-m 'not slow'`` so we don't re-run the slow tier here
        # (it already ran above). Coverage only needs ONE pass through
        # the test set to measure executed-line coverage.
        run: pytest -q -m 'not slow' --cov=src/hpc_agent --cov-report=term-missing

  test-windows:
    # Signal-only Windows lane (ref #163): there is otherwise no Windows
    # coverage in CI, so Windows-specific correctness only surfaces during
    # live testing. This runs the same default test command as the Linux
    # ``test`` job on windows-latest. It is intentionally non-blocking
    # (``continue-on-error``) because ~86 tests are skipped on Windows and
    # the suite may be red here until those skips are triaged (#163);
    # making it required would block merges before that work is done.
    name: test (windows)
    runs-on: windows-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          # Include uv.lock so a transitive-dep bump invalidates the
          # cache; pyproject.toml alone misses lockfile-only changes.
          cache-dependency-path: |
            pyproject.toml
            uv.lock
      - name: Install package with dev extras
        # Use bash (available on windows-latest) so the ``'.[dev]'``
        # quoting and command semantics match the Linux job exactly
        # rather than relying on the default pwsh shell.
        shell: bash
        run: pip install -e '.[dev]'
      - name: Pytest (default)
        shell: bash
        run: pytest -q

  pro:
    # The hpc-agent-pro plugin package — built and tested independently
    # of the public package it extends. Lives in the same repo so this
    # runs on the same commit; that is what makes contract drift between
    # the two packages impossible to merge unnoticed.
    name: hpc-agent-pro
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install host + plugin with dev extras
        # Install the host first so the plugin's hpc-agent>=0.4
        # requirement resolves against the local checkout rather than
        # the package registry.
        run: |
          pip install -e .
          pip install -e './hpc-agent-pro[dev]'
      - name: Ruff lint
        run: ruff check hpc-agent-pro
      - name: Pytest
        working-directory: hpc-agent-pro
        run: pytest -q

  pro-integration:
    # With both packages installed, the plugin must register its
    # primitives, restore its CLI subcommands, and be reachable through
    # the host's contract surfaces (``describe`` + ``capabilities``).
    # A failure here means the contract surface between the packages has
    # drifted — which is exactly the class of bug a host-side version
    # pin ("hpc-agent>=0.3,<0.4") would silently introduce.
    name: pro-integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install host + plugin in the same env
        # Install BOTH packages editable in the same env. If the
        # plugin's ``hpc-agent`` requirement excluded the host's
        # version, pip would fall back to PyPI here and the
        # subsequent integration checks would import an unrelated
        # host build — the contract-surface assertions below would
        # then fail loudly rather than silently. ``[dev]`` on the
        # plugin pulls in pytest so the e2e atom step below resolves.
        run: |
          pip install -e . -e './hpc-agent-pro[dev]'
      - name: Verify the plugin plugs into the host
        # Asserts registry membership + ``hpc-agent --help`` surface +
        # plugin SKILL.md routing to delegated workers.
        run: python scripts/check_plugin_integration.py
      - name: Assert ``describe`` resolves a plugin primitive
        # Smoke test of the host's per-primitive contract surface
        # against a plugin-owned primitive. ``ok: false`` here means
        # the plugin's @primitive decorator never registered, or the
        # host installed an incompatible version that lacks the
        # registry seam this plugin writes to.
        run: |
          hpc-agent describe predict-start-time > /tmp/describe.json
          cat /tmp/describe.json
          python -c "
          import json
          d = json.load(open('/tmp/describe.json'))
          assert d['ok'] is True, d
          assert d['data']['kind'] == 'primitive'
          assert d['data']['content']['python'].startswith('hpc_agent_pro.'), d
          print('OK: describe resolves a plugin-owned primitive to its plugin module.')
          "
      - name: Assert plugin operations appear in the capabilities catalog
        # ``capabilities`` is what agents read to discover what's
        # callable. Plugin ops missing here = the catalog the LLM sees
        # is wrong.
        run: |
          python -m hpc_agent capabilities > /tmp/caps.json
          python -c "
          import json
          d = json.load(open('/tmp/caps.json'))['data']
          names = {o['name'] for o in d['operations']}
          for req in ('predict-start-time', 'best-submit-window', 'walltime-drift'):
              assert req in names, f'{req} missing from capabilities (have: {sorted(names)})'
          print(f'OK: {len(names)} operations in catalog, plugin ops present.')
          "
      - name: End-to-end atom against a fixture (no lightgbm path)
        # Smallest atom that exercises the plugin entry point: a pure
        # function under hpc_agent_pro.atoms imported through the
        # installed plugin. Runs in well under a second.
        run: pytest -q hpc-agent-pro/tests/forecast/test_walltime_arbitrage.py
