name: ci

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install package with dev extras
        run: pip install -e '.[dev]'
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .
      - name: Mypy
        run: mypy claude_hpc
      - name: Lint primitive module list
        run: python scripts/lint_primitive_modules.py
      - name: Check primitive frontmatter is regenerated from registry
        run: python scripts/build_primitive_frontmatter.py --check
      - name: Pytest
        run: pytest -q --deselect tests/test_docs_links.py
