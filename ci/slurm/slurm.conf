# Minimal single-node Slurm config for the scheduler-integration CI container.
#
# One host runs slurmctld AND slurmd AND the login shell — the pragmatic v1
# (docs/internals/scheduler-integration-ci.md). This is NOT a production config:
# no cgroups (containers), no accounting DB, memory/CPU are UNDER-reported on
# purpose so the node never drains on a small GitHub runner.
#
# Key choices and why:
#   * TaskPlugin=task/none + ProctrackType=proctrack/linuxproc — no cgroup
#     hierarchy is required, which a default Docker container does not provide.
#   * SelectType=select/cons_tres with CR_CPU — lets the 2-task array run two
#     tasks concurrently on the single node without whole-node allocation.
#   * CPUs/RealMemory are set BELOW what any GitHub runner has. Slurm only
#     drains a node when configured resources EXCEED the detected hardware, so
#     under-reporting is always safe; the smoke test's job requests tiny
#     --mem / --cpus-per-task via SubmitResources (overriding the template's
#     16G/4-cpu #SBATCH directives) so it always fits.
ClusterName=slurmci
SlurmctldHost=localhost

AuthType=auth/munge
CryptoType=crypto/munge

# Both daemons run as root in the container (the entrypoint is root); setting
# SlurmUser=root avoids slurmctld's "not running as SlurmUser" refusal. Fine for
# a throwaway single-node CI auth domain — never do this in production.
SlurmUser=root
SlurmdUser=root

SlurmctldPort=6817
SlurmdPort=6818

StateSaveLocation=/var/spool/slurmctld
SlurmdSpoolDir=/var/spool/slurmd
SlurmctldPidFile=/var/run/slurmctld.pid
SlurmdPidFile=/var/run/slurmd.pid

SlurmctldLogFile=/var/log/slurm/slurmctld.log
SlurmdLogFile=/var/log/slurm/slurmd.log

ProctrackType=proctrack/linuxproc
TaskPlugin=task/none
SwitchType=switch/none
MpiDefault=none

SchedulerType=sched/backfill
SelectType=select/cons_tres
SelectTypeParameters=CR_CPU

# Return the node to service automatically after a restart / transient down.
ReturnToService=2

# Fast timers so a short CI run reaches terminal state quickly.
SlurmctldTimeout=30
SlurmdTimeout=30
InactiveLimit=0
MinJobAge=2
KillWait=5
Waittime=0

# Single node. CPUs=2 (every GitHub runner has >=2) so the 2-task array can run
# both tasks at once; RealMemory deliberately small — the job overrides --mem.
NodeName=localhost CPUs=2 RealMemory=1500 State=UNKNOWN
PartitionName=debug Nodes=localhost Default=YES MaxTime=INFINITE State=UP OverSubscribe=YES
