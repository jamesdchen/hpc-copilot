hoffman2:
  host: hoffman2.idre.ucla.edu
  user: <your_user>
  scheduler: sge
  scratch: <your_scratch>
  # Leave empty and provide Python via conda (conda_source + conda_envs
  # below). Hoffman2's `module avail python` set changes over releases —
  # pin a specific `python/X.Y.Z` here ONLY after confirming it exists on
  # the compute nodes (`module avail python` on a login node). A stale
  # pin fails every task with "Unable to locate a modulefile".
  modules: []
  conda_source: /u/local/apps/anaconda3/2024.06/etc/profile.d/conda.sh
  # conda_envs is your experiment runtime, but it currently ALSO supplies the
  # cluster-side `hpc_agent` the combiner/status-reporter import (#349): the
  # framework deploys only a stdlib-only import closure, so the reporter's
  # runtime deps (pydantic/yaml/jsonschema) still come from this env. Until the
  # cluster-gated python-only flip lands, a stdlib-only experiment still needs an
  # env here that has hpc_agent installed.
  conda_envs: [<your_env>]
  gpu_types: [a100, h200, a6000, h100, v100, rtx2080ti]
  # Per-cluster GPU queue map for live scoring (infra/gpu.py).
  # Each key is the SGE queue prefix that qstat -f reports; each value
  # carries the canonical GPU name + a relative performance weight used
  # by score_gpus. Omit this block to fall back to the Hoffman2-shaped
  # default baked into infra/gpu.py:_DEFAULT_GPU_CONFIG; uncomment and
  # edit when porting to a new cluster with different GPU queues.
  # gpu_queues:
  #   gpu_h200: {name: H200, perf: 1.5}
  #   gpu_a100: {name: A100, perf: 1.2}
  #   gpu_h100: {name: H100, perf: 1.3}
  #   gpu_a6000: {name: A6000, perf: 1.0}
  #   gpu_l40s: {name: L40S, perf: 1.1}
  #   gpu_v100: {name: V100, perf: 0.7}
  #   gpu_RTX2080Ti: {name: RTX2080Ti, perf: 0.5}
  # excluded_gpu_queue_prefixes:
  #   - gpu_P4
  #   - gpu_k40
  #   - gpu_smp
  #   - gpu_test
  #   - gpu_rh7
  #   - gpu_a100_test
  #   - gpu_l40s_multi
  # Cold-start mem headroom: when no runtime prior exists for the
  # (profile, cluster, cmd_sha) the user's --mem ask is multiplied by
  # (1 + cold_start_mem_buffer) so the OOM daemon doesn't bump the job
  # mid-write. The smart planner takes over once ≥5 successful samples
  # exist per (profile, cluster, gpu_type).
  cold_start_mem_buffer: 0.15
  # Optional NFS path the templates rsync into local node SSD
  # ($SLURM_TMPDIR / $TMPDIR) at preamble time. Set to a per-user
  # dataset path (e.g., /u/scratch/.../shared_data) and the executor
  # reads from $LOCAL_DATA_DIR instead. Omit to disable.
  # nfs_data_dir: <your_scratch>/datasets
  # Cold-start walltime trim: when no runtime prior exists to score
  # candidates the planner trims the nominal ask by 15min and floors
  # to a 5min boundary, so the campus user fits in backfill shadows
  # the round-number ask doesn't reach. Default true.
  walltime_arbitrage: true
  # Hard scheduler walltime ceiling (seconds). UCLA Hoffman2 highp queue
  # is 24h. Auto-daisy-chain fires when an ask exceeds (max - 1h
  # queue-wait buffer) so a long task survives the cluster's hard
  # walltime ceiling.
  max_walltime_sec: 86400
  # Cold-start walltime ask (seconds): used on the FIRST submit, before any
  # measured runtime prior is available (an optional prior-reading verb, when
  # installed, would otherwise supply one). Omit to let the resolver fall back to
  # a conservative built-in default (4h), clamped to max_walltime_sec; set it
  # here to match your typical job so the very first array isn't over- or
  # under-provisioned. Once a prior exists it takes precedence over this.
  # default_walltime_sec: 14400
  # Largest single-node memory ask the cluster will schedule (MB).
  # When set, the planner clamps the cold-start mem buffer (and any
  # other grower) so a campus user's run doesn't sit Pending forever
  # with ReqNodeNotAvail. Hoffman2 has 96/192/384 GB nodes depending on
  # partition; default to the most permissive (384 GB) so a request
  # bound for a smaller partition still surfaces a clear "buffer
  # clamped" rationale instead of silently exceeding partition limits.
  max_node_mem_mb: 384000
  # Auto-daisy-chain default is detection-driven (absent key here):
  # chain only when past runs of (profile, cluster) produced
  # checkpoint-shaped files; otherwise emit the explanatory error so
  # we don't silently waste compute on a chain that starts from
  # scratch every segment. Uncomment to override:
  # auto_daisy_chain: true     # always chain (skip checkpoint scan)
  # auto_daisy_chain: false    # never chain on this cluster (kill switch)
  constraints:
    max_array_size: 100
    max_walltime: "3:00:00"
    max_concurrent_jobs: 2
    est_spin_up: "5m"
    # Cost/scale gate (#345). Estimated core-hours
    # (tasks x walltime x cores) above this require interactive
    # confirmation, or are refused with spec_invalid for an unattended
    # agent unless under HPC_AGENT_COST_BUDGET. OFF by default (key
    # omitted) — uncomment and set a core-hours ceiling to enable.
    # max_estimated_core_hours: 5000

discovery:
  host: discovery2.usc.edu
  user: <your_user>
  scheduler: slurm
  account: <your_account>
  scratch: <your_scratch>
  modules: []
  conda_source: /apps/conda/miniforge3/25.3.0/etc/profile.d/conda.sh
  conda_envs: [<your_env>]
  gpu_types: [a100, a40, v100, l40s]
  gpu_constraint: "a100|a40|v100|l40s"
  cold_start_mem_buffer: 0.15
  # nfs_data_dir: <your_scratch>/datasets
  # Cold-start walltime trim: when no runtime prior exists to score
  # candidates the planner trims the nominal ask by 15min and floors
  # to a 5min boundary, so the campus user fits in backfill shadows
  # the round-number ask doesn't reach. Default true.
  walltime_arbitrage: true
  # Hard scheduler walltime ceiling (seconds). USC CARC Discovery main
  # queue is 48h. Auto-daisy-chain fires when an ask exceeds (max - 1h
  # queue-wait buffer) so a long task survives the cluster's hard
  # walltime ceiling.
  max_walltime_sec: 172800
  # Cold-start walltime ask (seconds) for the FIRST submit, before a measured
  # runtime prior is available (an optional prior-reading verb, when installed,
  # would otherwise supply one). Omit to fall back to a conservative built-in
  # default (4h), clamped to max_walltime_sec; set it to match your typical job.
  # A prior takes precedence over this once one exists.
  # default_walltime_sec: 14400
  # Largest single-node memory ask the cluster will schedule (MB).
  # USC CARC Discovery has nodes up to ~256 GB on most partitions;
  # use a permissive default so requests bound for smaller partitions
  # surface a clear "buffer clamped" rationale instead of silently
  # exceeding the per-node limit.
  max_node_mem_mb: 256000
  # Auto-daisy-chain default is detection-driven (absent key here):
  # chain only when past runs of (profile, cluster) produced
  # checkpoint-shaped files; otherwise emit the explanatory error so
  # we don't silently waste compute on a chain that starts from
  # scratch every segment. Uncomment to override:
  # auto_daisy_chain: true     # always chain (skip checkpoint scan)
  # auto_daisy_chain: false    # never chain on this cluster (kill switch)
  constraints:
    max_array_size: 100
    max_walltime: "3:00:00"
    max_concurrent_jobs: 2
    est_spin_up: "5m"
    # Cost/scale gate (#345). Estimated core-hours
    # (tasks x walltime x cores) above this require interactive
    # confirmation, or are refused with spec_invalid for an unattended
    # agent unless under HPC_AGENT_COST_BUDGET. OFF by default (key
    # omitted) — uncomment and set a core-hours ceiling to enable.
    # max_estimated_core_hours: 5000
