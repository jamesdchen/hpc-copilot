# Pre-commit gates that mirror the CI checks but auto-fix when possible.
# Install with: pre-commit install
#
# Why local hooks instead of upstream pre-commit-hooks repos: the four
# regen scripts depend on the in-tree package being importable, so they
# can't run from a pre-commit virtualenv. Each hook below runs against
# the current repo's Python via `uv run` (or plain `python` if uv is
# not installed) so the registry import resolves correctly.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Keep in lock-step with the exact ``ruff==`` pin in pyproject's dev
    # extra and CI: the formatter's output shifts between releases, so a
    # skewed hook version formats locally what CI's ``ruff format
    # --check`` then rejects.
    rev: v0.15.18
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: lint-text-io-encoding
        name: text I/O must pass encoding='utf-8' (TIO001)
        entry: python scripts/lint_text_io_encoding.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/.*\.py|scripts/[^/]+\.py)$'

      - id: lint-subject-init
        name: subject __init__.py must be docstring-only
        entry: python scripts/lint_subject_init.py
        language: system
        pass_filenames: false
        files: '^src/hpc_agent/(ops|meta)/.*/__init__\.py$'

      - id: lint-schema-versions
        name: cluster-side schema-version constants stay in sync
        entry: python scripts/lint_schema_versions.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/execution/mapreduce/(dispatch|combiner)\.py|src/hpc_agent/state/runs\.py|scripts/lint_schema_versions\.py)$'

      - id: build-primitive-frontmatter
        name: regenerate primitive frontmatter
        entry: python scripts/build_primitive_frontmatter.py --write
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/.*\.py|docs/primitives/.*\.md)$'

      - id: build-primitive-index
        name: regenerate primitive catalog table
        entry: python scripts/build_primitive_index.py
        language: system
        pass_filenames: false
        files: '^docs/primitives/.*\.md$'

      - id: build-verb-module-map
        name: regenerate CLI fast-path verb→module map
        entry: python scripts/build_verb_module_map.py --write
        language: system
        pass_filenames: false
        # Fires whenever a primitive-bearing source changes — adding, renaming,
        # moving, or grouping a verb changes the single-verb fast-path map. The
        # runtime is self-healing (a stale entry just falls back to the full
        # path), so this is a perf-hygiene gate, not correctness-critical.
        files: '^src/hpc_agent/.*\.py$'

      - id: build-operations-index
        name: regenerate operations index
        entry: python scripts/build_operations_index.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/.*\.py|src/hpc_agent/schemas/.*\.json)$'

      - id: build-schemas
        name: regenerate JSON schemas from Pydantic models
        entry: python scripts/build_schemas.py --write
        language: system
        pass_filenames: false
        # ``build_schemas.py`` walks ``hpc_agent._wire`` for the core
        # Pydantic models — fires whenever that surface changes.
        files: '^src/hpc_agent/_wire/.*\.py$'

      - id: bake-operations-json
        name: regenerate baked operations.json (wheel-install fallback)
        entry: python scripts/bake_operations_json.py --write
        language: system
        pass_filenames: false
        files: '^src/hpc_agent/.*\.py$'

      - id: lint-primitive-doc-templates
        name: check primitive doc templates match agent_facing tier
        entry: python scripts/lint_primitive_doc_templates.py
        language: system
        pass_filenames: false
        files: '^(docs/primitives/.*\.md|src/hpc_agent/.*\.py)$'

      - id: check-no-pending-primitive-docs
        name: fail on '_Documentation pending._' in primitive docs
        entry: python scripts/check_no_pending_primitive_docs.py
        language: system
        pass_filenames: false
        files: '^docs/primitives/.*\.md$'

      - id: lint-skill-command-sync
        name: check src/hpc_agent/slash_commands/skills/ <-> src/hpc_agent/slash_commands/commands/ stay paired
        entry: python scripts/lint_skill_command_sync.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/slash_commands/skills/.*/SKILL\.md|src/hpc_agent/slash_commands/commands/.*\.md|scripts/lint_skill_command_sync\.py)$'

      - id: lint-decision-content
        name: operationally-shared markdown blocks stay byte-identical across files
        entry: python scripts/lint_decision_content.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/slash_commands/skills/.*/SKILL\.md|src/hpc_agent/slash_commands/commands/.*\.md|scripts/lint_decision_content\.py)$'

      - id: lint-pure-files
        name: '@pure: no-io files must not import I/O modules'
        entry: python scripts/lint_pure_files.py
        language: python
        pass_filenames: false

      - id: lint-subject-imports
        name: subjects under ops/ and meta/ must not cross-import
        entry: python scripts/lint_subject_imports.py
        language: python
        pass_filenames: false

      - id: lint-library-knowledge
        name: library-knowledge packages imported only at declared assembly points
        entry: python scripts/lint_library_knowledge.py
        language: python
        pass_filenames: false

      - id: lint-backend-boundary
        name: orchestrator imports only the backend seam, never a concrete backend
        entry: python scripts/lint_backend_boundary.py
        language: python
        pass_filenames: false

      - id: lint-no-raw-ssh
        name: agent-facing prose routes cluster access through throttled verbs, never raw ssh
        entry: python scripts/lint_no_raw_ssh.py
        language: python
        pass_filenames: false
        files: '^(src/hpc_agent/slash_commands/skills/.*/SKILL\.md|src/hpc_agent/_kernel/extension/worker_prompts/.*\.md|scripts/lint_no_raw_ssh\.py)$'

      - id: lint-telemetry-labels
        name: every emitted telemetry field declares cumulative vs per-tick delta
        entry: python scripts/lint_telemetry_labels.py
        language: python
        pass_filenames: false
        files: '^(src/hpc_agent/ops/monitor/(summary|tick_log)\.py|scripts/lint_telemetry_labels\.py)$'

      - id: lint-no-blocklisted-commands
        name: agent-facing prose never authors a harness-block-listed command (autonomous-stall guard)
        entry: python scripts/lint_no_blocklisted_commands.py
        language: python
        pass_filenames: false
        files: '^(src/hpc_agent/slash_commands/skills/.*/SKILL\.md|src/hpc_agent/_kernel/extension/worker_prompts/.*\.md|scripts/lint_no_blocklisted_commands\.py)$'

      - id: lint-plugin-manifests
        name: every loaded plugin's MANIFEST reconciles with runtime reality
        entry: python scripts/lint_plugin_manifests.py
        language: system
        pass_filenames: false
        files: '^(src/hpc_agent/_wire/plugin_manifest\.py|scripts/lint_plugin_manifests\.py)$'
