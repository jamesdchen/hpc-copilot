# Pre-commit gates that mirror the CI checks but auto-fix when possible.
# Install with: pre-commit install
#
# Why local hooks instead of upstream pre-commit-hooks repos: the four
# regen scripts depend on the in-tree package being importable, so they
# can't run from a pre-commit virtualenv. Each hook below runs against
# the current repo's Python via `uv run` (or plain `python` if uv is
# not installed) so the registry import resolves correctly.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: lint-primitive-modules
        name: lint primitive module list
        entry: python scripts/lint_primitive_modules.py
        language: system
        pass_filenames: false
        files: '^src/claude_hpc/.*\.py$'

      - id: build-primitive-frontmatter
        name: regenerate primitive frontmatter
        entry: python scripts/build_primitive_frontmatter.py --write
        language: system
        pass_filenames: false
        files: '^(src/claude_hpc/atoms/.*\.py|docs/primitives/.*\.md|src/claude_hpc/_internal/_primitive\.py)$'

      - id: build-primitive-index
        name: regenerate primitive catalog table
        entry: python scripts/build_primitive_index.py
        language: system
        pass_filenames: false
        files: '^docs/primitives/.*\.md$'

      - id: build-operations-index
        name: regenerate operations index
        entry: python scripts/build_operations_index.py
        language: system
        pass_filenames: false
        files: '^(src/claude_hpc/.*\.py|src/claude_hpc/schemas/.*\.json)$'
